    <!-- ─── FAQ Structured Data ──────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Hur beräknar man kostnaden för en bilresa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kostnaden för en bilresa beräknas genom att multiplicera distansen (i km) med bilens förbrukning (liter per 100 km) och sedan multiplicera med aktuellt bränslepris. Formeln är: (distans × förbrukning / 100) × bränslepris = total kostnad."
          }
        },
        {
          "@type": "Question",
          "name": "Vad kostar det att köra bil per mil i Sverige?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Med ett genomsnittligt bensinpris på ca 18–19 kr/liter och en förbrukning på 8–9 liter/100 km kostar det ungefär 14–17 kr per mil att köra bensinbil. För diesel är kostnaden något lägre. Elbil kostar typiskt 5–8 kr per mil beroende på elpriset."
          }
        },
        {
          "@type": "Question",
          "name": "Hur mycket bränsle går det åt på en lång bilresa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En genomsnittlig bensinbil förbrukar 7–10 liter per 100 km. På en resa Stockholm–Göteborg (ca 47 mil) går det åt ungefär 33–47 liter bränsle, vilket kostar ca 600–900 kr."
          }
        },
        {
          "@type": "Question",
          "name": "Är det billigare att köra elbil än bensinbil?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, i de flesta fall. En elbil förbrukar typiskt 15–25 kWh per 100 km. Med ett elpris på 2–3 kr/kWh kostar det 30–75 kr per 10 mil, jämfört med 130–180 kr för en bensinbil."
          }
        }
      ]
    }
    </script>
